<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CoreSystm Stopwatch</title>
    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            /* Fonts */
            --font-primary: 'Inter', sans-serif;
            --font-heading: 'Hanken Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Light Theme Color Palette */
            --bg-color: #f8f9ff;
            --on-bg-color: #0b1c30;
            --surface-color: #ffffff;
            --surface-container: #e5eeff;
            --surface-container-low: #eff4ff;
            --surface-container-lowest: #ffffff;
            --on-surface: #0b1c30;
            --on-surface-variant: #45464d;
            --primary-color: #000000;
            --secondary-color: #4648d4;
            --secondary-hover: #3335b3;
            --secondary-container: #6063ee;
            --on-secondary: #ffffff;
            --outline: #76777d;
            --outline-variant: #c6c6cd;
            --on-primary-container: #7c839b;
            --card-shadow: 0 8px 32px rgba(11, 28, 48, 0.04);
            --header-bg: rgba(248, 249, 255, 0.8);
            --border-color: #e5eeff;
        }

        /* Dark Theme overrides */
        html.dark {
            --bg-color: #0b1c30;
            --on-bg-color: #f8f9ff;
            --surface-color: #122237;
            --surface-container: #1b2f4a;
            --surface-container-low: #101d30;
            --surface-container-lowest: #0e1927;
            --on-surface: #f8f9ff;
            --on-surface-variant: #a9acb9;
            --primary-color: #ffffff;
            --secondary-color: #89ceff;
            --secondary-hover: #a6dbff;
            --secondary-container: #004c6e;
            --on-secondary: #001e2f;
            --outline: #9295a3;
            --outline-variant: #3e4859;
            --on-primary-container: #a3abc4;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            --header-bg: rgba(11, 28, 48, 0.8);
            --border-color: #1b2f4a;
        }

        /* Base resets & styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--on-bg-color);
            font-family: var(--font-primary);
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Top Bar */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            background-color: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        @media (min-width: 768px) {
            .header-container {
                padding: 0 64px;
            }
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .header-brand .logo-icon {
            color: var(--secondary-color);
            font-size: 28px;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .header-brand h1 {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            color: var(--on-surface);
        }

        .header-nav {
            display: none;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .header-nav {
                display: flex;
            }
        }

        .nav-link {
            font-size: 16px;
            font-weight: 500;
            color: var(--on-surface-variant);
            text-decoration: none;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        .nav-link:hover {
            color: var(--secondary-color);
        }

        .nav-link.active {
            color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
        }

        .icon-button:hover {
            background-color: var(--surface-container);
            color: var(--secondary-color);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding-top: 96px;
            padding-bottom: 128px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-left: 20px;
            padding-right: 20px;
        }

        @media (min-width: 768px) {
            .main-content {
                padding-left: 64px;
                padding-right: 64px;
            }
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        /* Timer Card Styles */
        .timer-card {
            width: 100%;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .timer-card {
                padding: 48px;
            }
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(229, 238, 255, 0.3) 0%, rgba(229, 238, 255, 0) 100%);
            pointer-events: none;
        }

        html.dark .card-overlay {
            background: linear-gradient(180deg, rgba(27, 47, 74, 0.3) 0%, rgba(27, 47, 74, 0) 100%);
        }

        .session-tag {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--on-primary-container);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
            z-index: 1;
        }

        .timer-display {
            font-family: var(--font-heading);
            font-size: 64px;
            font-weight: 700;
            color: var(--on-surface);
            display: flex;
            align-items: baseline;
            gap: 4px;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            z-index: 1;
        }

        @media (min-width: 768px) {
            .timer-display {
                font-size: 88px;
                gap: 8px;
            }
        }

        .timer-part {
            transition: opacity 0.3s ease;
        }

        .timer-part.inactive {
            opacity: 0.4;
        }

        .timer-separator {
            color: var(--secondary-color);
            transition: opacity 0.3s ease;
        }

        .timer-separator.inactive {
            opacity: 0.4;
        }

        .timer-dot {
            font-family: var(--font-primary);
            font-size: 24px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-left: 4px;
        }

        @media (min-width: 768px) {
            .timer-dot {
                margin-left: 8px;
            }
        }

        .centiseconds-display {
            font-size: 32px;
            font-weight: 600;
            color: var(--secondary-color);
            width: 1.5ch;
            display: inline-block;
            font-variant-numeric: tabular-nums;
        }

        @media (min-width: 768px) {
            .centiseconds-display {
                font-size: 32px;
                /* Fixed in original config as headline-md, let's keep it clean */
            }
        }

        /* Controls Grid/Buttons */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            height: 56px;
            border-radius: 9999px;
            border: 1px solid var(--outline);
            background-color: transparent;
            color: var(--on-surface);
            font-family: var(--font-primary);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            outline: none;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--surface-container);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-main {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--secondary-color);
            color: var(--on-secondary);
            border: none;
            box-shadow: 0 8px 24px rgba(70, 72, 212, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
        }

        @media (min-width: 768px) {
            .btn-main {
                width: 96px;
                height: 96px;
            }
        }

        .btn-main:hover {
            background-color: var(--secondary-hover);
            box-shadow: 0 12px 28px rgba(70, 72, 212, 0.35);
        }

        .btn-main:active {
            transform: scale(0.9);
        }

        .btn-main .material-symbols-outlined {
            font-size: 32px;
        }

        @media (min-width: 768px) {
            .btn-main .material-symbols-outlined {
                font-size: 40px;
            }
        }

        /* Lap List */
        .lap-section {
            width: 100%;
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lap-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px 16px 24px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--on-surface-variant);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--border-color);
        }

        .lap-col-num {
            width: 48px;
            text-align: left;
        }

        .lap-col-time {
            flex: 1;
            text-align: center;
        }

        .lap-col-total {
            width: 96px;
            text-align: right;
        }

        .lap-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 8px;
        }

        /* Custom Scrollbar */
        .lap-list::-webkit-scrollbar {
            width: 6px;
        }

        .lap-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .lap-list::-webkit-scrollbar-thumb {
            background-color: var(--outline-variant);
            border-radius: 3px;
        }

        .lap-list::-webkit-scrollbar-thumb:hover {
            background-color: var(--outline);
        }

        .lap-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            font-family: var(--font-primary);
            border-radius: 12px;
            background-color: transparent;
            animation: slideIn 0.3s ease-out forwards;
        }

        .lap-row:first-child {
            background-color: var(--surface-container);
        }

        .lap-row .lap-col-num {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            color: var(--secondary-color);
        }

        .lap-row .lap-col-time {
            font-weight: 600;
            color: var(--on-surface);
        }

        .lap-col-time-ms {
            color: var(--secondary-color);
            opacity: 0.6;
        }

        .lap-row .lap-col-total {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--on-surface-variant);
        }

        .no-laps {
            text-align: center;
            padding: 48px 0;
            color: var(--on-surface-variant);
            opacity: 0.4;
            font-style: italic;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-8px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Footer */
        .app-footer {
            background-color: var(--surface-container-lowest);
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            width: 100%;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .footer-container {
                flex-direction: row;
                padding: 48px 64px;
            }
        }

        .footer-copyright {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--on-surface-variant);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-link {
            font-size: 16px;
            color: var(--on-surface);
            text-decoration: underline;
            opacity: 0.8;
        }

        .footer-link:hover {
            opacity: 1;
            color: var(--secondary-color);
        }
    </style>
</head>

<body>
    <!-- TopAppBar -->
    <header class="app-header">
        <div class="header-container">
            <a href="#" class="header-brand">
                <span class="material-symbols-outlined logo-icon">timer</span>
                <h1>CoreSystm</h1>
            </a>
            <div class="header-actions">
                <nav class="header-nav">
                    <a class="nav-link active" href="#">Stopwatch</a>
                    <a class="nav-link" href="#">Dashboard</a>
                    <a class="nav-link" href="#">History</a>
                </nav>
                <button id="theme-toggle" class="icon-button" aria-label="Toggle Theme">
                    <span class="material-symbols-outlined" id="theme-toggle-icon">dark_mode</span>
                </button>
                <button class="icon-button" aria-label="Settings">
                    <span class="material-symbols-outlined">settings</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Timer Card -->
            <div class="timer-card">
                <div class="card-overlay"></div>
                <span class="session-tag">Active Session</span>
                <div class="timer-display" id="display">
                    <span class="timer-part inactive" id="hours">00</span>
                    <span class="timer-separator inactive" id="hours-separator">:</span>
                    <span class="timer-part" id="minutes">00</span>
                    <span class="timer-separator">:</span>
                    <span class="timer-part" id="seconds">00</span>
                    <span class="timer-dot">.</span>
                    <span class="centiseconds-display" id="centiseconds">00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-row">
                <button class="btn" disabled id="lap-btn">
                    <span class="material-symbols-outlined">flag</span>
                    Lap
                </button>
                <button class="btn-main" id="start-pause-btn" aria-label="Start or Pause Timer">
                    <span class="material-symbols-outlined" id="play-icon">play_arrow</span>
                </button>
                <button class="btn" disabled id="reset-btn">
                    <span class="material-symbols-outlined">restart_alt</span>
                    Reset
                </button>
            </div>

            <!-- Lap List -->
            <div class="lap-section">
                <div class="lap-header">
                    <span class="lap-col-num">Lap</span>
                    <span class="lap-col-time">Lap Time</span>
                    <span class="lap-col-total">Total</span>
                </div>
                <div class="lap-list" id="lap-list">
                    <div class="no-laps">
                        No recorded laps yet.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="footer-container">
            <span class="footer-copyright">© 2024 CoreSystm Productivity Suite. All rights reserved.</span>
            <div class="footer-links">
                <a class="footer-link" href="#">Privacy</a>
                <a class="footer-link" href="#">Terms</a>
                <a class="footer-link" href="#">API Docs</a>
            </div>
        </div>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleIcon = document.getElementById('theme-toggle-icon');

        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeToggleIcon.textContent = 'light_mode';
            } else {
                document.documentElement.classList.remove('dark');
                themeToggleIcon.textContent = 'dark_mode';
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeToggleIcon.textContent = 'dark_mode';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeToggleIcon.textContent = 'light_mode';
            }
        });

        // Initialize theme
        applyTheme();

        // Stopwatch Timer Logic
        let startTime;
        let elapsedTime = 0;
        let timerInterval;
        let running = false;
        let laps = [];

        const displayHours = document.getElementById('hours');
        const displayHoursSeparator = document.getElementById('hours-separator');
        const displayMinutes = document.getElementById('minutes');
        const displaySeconds = document.getElementById('seconds');
        const displayCenti = document.getElementById('centiseconds');

        const startPauseBtn = document.getElementById('start-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const lapBtn = document.getElementById('lap-btn');
        const resetBtn = document.getElementById('reset-btn');
        const lapList = document.getElementById('lap-list');

        function formatTime(ms) {
            let h = Math.floor(ms / 3600000);
            let m = Math.floor((ms % 3600000) / 60000);
            let s = Math.floor((ms % 60000) / 1000);
            let c = Math.floor((ms % 1000) / 10);
            return {
                h: h.toString().padStart(2, '0'),
                m: m.toString().padStart(2, '0'),
                s: s.toString().padStart(2, '0'),
                c: c.toString().padStart(2, '0')
            };
        }

        function updateDisplay() {
            const time = formatTime(elapsedTime);
            displayHours.textContent = time.h;
            displayMinutes.textContent = time.m;
            displaySeconds.textContent = time.s;
            displayCenti.textContent = time.c;

            // Highlight hours and hours separator if active
            if (parseInt(time.h) > 0) {
                displayHours.classList.remove('inactive');
                displayHoursSeparator.classList.remove('inactive');
            } else {
                displayHours.classList.add('inactive');
                displayHoursSeparator.classList.add('inactive');
            }
        }

        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                updateDisplay();
            }, 10);
            running = true;
            playIcon.textContent = 'pause';
            lapBtn.disabled = false;
            resetBtn.disabled = true;
        }

        function stop() {
            clearInterval(timerInterval);
            running = false;
            playIcon.textContent = 'play_arrow';
            resetBtn.disabled = false;
        }

        function reset() {
            stop();
            elapsedTime = 0;
            updateDisplay();
            laps = [];
            lapList.innerHTML = '<div class="no-laps">No recorded laps yet.</div>';
            lapBtn.disabled = true;
            resetBtn.disabled = true;
            displayHours.classList.add('inactive');
            displayHoursSeparator.classList.add('inactive');
        }

        function addLap() {
            const currentTotal = elapsedTime;
            const lastLapTotal = laps.length > 0 ? laps[0].total : 0;
            const lapTime = currentTotal - lastLapTotal;

            const lapData = {
                number: laps.length + 1,
                lapTime: formatTime(lapTime),
                total: currentTotal,
                totalFormatted: formatTime(currentTotal)
            };

            laps.unshift(lapData);
            renderLaps();
        }

        function renderLaps() {
            if (laps.length === 0) return;

            lapList.innerHTML = laps.map(lap => `
                <div class="lap-row">
                    <span class="lap-col-num">#${lap.number.toString().padStart(2, '0')}</span>
                    <span class="lap-col-time">
                        ${lap.lapTime.h !== '00' ? lap.lapTime.h + ':' : ''}${lap.lapTime.m}:${lap.lapTime.s}<span class="lap-col-time-ms">.${lap.lapTime.c}</span>
                    </span>
                    <span class="lap-col-total">
                        ${lap.totalFormatted.m}:${lap.totalFormatted.s}
                    </span>
                </div>
            `).join('');
        }

        startPauseBtn.addEventListener('click', () => {
            if (running) stop();
            else start();
        });

        lapBtn.addEventListener('click', addLap);
        resetBtn.addEventListener('click', reset);
    </script>
</body>

</html>
